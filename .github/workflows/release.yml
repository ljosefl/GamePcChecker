# Сборка self-contained zip и публикация GitHub Release по тегу v* (без локального PAT).
# Если тег уже запушен без релиза: Actions -> Release -> Run workflow -> ввести тег, например v1.2.3
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Существующий тег (например v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Meta (ref + version)
        id: meta
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:EVENT_NAME -eq 'workflow_dispatch') {
            $r = $env:INPUT_TAG.Trim()
          } else {
            $r = $env:GITHUB_REF_NAME
          }
          if ([string]::IsNullOrWhiteSpace($r)) { throw 'Empty tag ref' }
          $ver = $r.TrimStart('v')
          Add-Content -Path $env:GITHUB_OUTPUT -Value "ref=$r"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$ver"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.ref }}
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish and zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location $env:GITHUB_WORKSPACE
          ./scripts/publish-release.ps1 -SelfContained

      # Явные имена: glob v* на windows-runner иногда не находит файлы — без этого в Release только исходники.
      - name: GitHub Release + assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.ref }}
          name: Game PC Checker ${{ steps.meta.outputs.version }}
          body_path: CHANGELOG.md
          make_latest: true
          files: |
            artifacts/GamePcChecker-v${{ steps.meta.outputs.version }}-win-x64-selfcontained.zip
            artifacts/GamePcChecker-win-x64-selfcontained.zip
